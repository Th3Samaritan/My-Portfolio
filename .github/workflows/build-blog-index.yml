name: Build Blog Index

on:
  push:
    paths:
      - 'blog-posts/*.md'
      - 'notebook-pages/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build index files
        run: node scripts/build-index.js

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog-posts/index.json notebook-pages/index.json rss.xml sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update blog index, RSS, and sitemap [skip ci]"
            git push
          fi
