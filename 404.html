<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem;">
        <div>
            <h1 style="font-family: var(--font-heading); font-size: 6rem; font-weight: 800; color: var(--text-muted); letter-spacing: -0.05em;">404</h1>
            <p style="font-size: 1.25rem; color: var(--text-secondary); margin-top: 1rem;">Page not found.</p>
            <a href="index.html" class="btn btn-primary" style="margin-top: 2rem;">Back to Portfolio</a>
        </div>
    </div>

    <script>
        // Apply theme
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
